version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: homenest_db
    restart: always
    environment:
      MYSQL_DATABASE: homenest
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: homenest_backend
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/homenest
      SECRET_KEY: supersecretkeyplaceholder
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: homenest_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
